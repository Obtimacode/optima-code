<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optima Code | احترافية رقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #030303; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white">

    <!-- Navbar -->
    <nav class="flex justify-between items-center p-6 container mx-auto">
        <!-- هاد البلاصة فين غيتحط اللوجو -->
        <img src="logo.png" alt="Optima Code Logo" class="h-16 w-auto object-contain">
        
        <div class="space-x-8 space-x-reverse font-bold text-gray-300">
            <a href="#services" class="hover:text-purple-500 transition">خدماتنا</a>
            <a href="mailto:optimacodee@gmail.com" class="bg-purple-600 px-6 py-2 rounded-full hover:bg-purple-700 transition">تواصل معنا</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="h-[80vh] flex flex-col justify-center items-center text-center px-6">
        <h1 class="text-6xl md:text-8xl font-black mb-6 leading-tight">
            نحول أفكارك إلى <br> <span class="text-purple-500">واقع رقمي</span>
        </h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-lg mb-10">
            حلول برمجية بلمسة فنية وتكنولوجيا متطورة لنمو مشروعك.
        </p>
    </section>

    <!-- Services -->
    <section id="services" class="container mx-auto px-6 py-20">
        <div class="grid md:grid-cols-3 gap-6">
            <div class="glass-card p-8 rounded-2xl border-l-4 border-purple-500">
                <h3 class="text-xl font-bold mb-2">تطوير المواقع</h3>
                <p class="text-gray-400">برمجة مواقع سريعة ومتجاوبة.</p>
            </div>
            <div class="glass-card p-8 rounded-2xl border-l-4 border-purple-500">
                <h3 class="text-xl font-bold mb-2">هوية بصرية</h3>
                <p class="text-gray-400">تصاميم تعكس احترافيتك.</p>
            </div>
            <div class="glass-card p-8 rounded-2xl border-l-4 border-purple-500">
                <h3 class="text-xl font-bold mb-2">أنظمة ذكية</h3>
                <p class="text-gray-400">حلول تقنية مخصصة.</p>
            </div>
        </div>
    </section>

</body>
</html>
