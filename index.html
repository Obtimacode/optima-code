<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <title>Optima Code | Pro Level</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #020202; }
        
        /* تأثير النيون للوجو */
        .neon-logo { filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.6)); }
        
        /* كاردس بلمسة 3D */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            transform: translateY(-20px) scale(1.02);
            border-color: #a855f7;
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.2);
        }
    </style>
</head>
<body class="text-white overflow-x-hidden">

    <!-- Hero -->
    <section class="h-screen flex flex-col justify-center items-center relative">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(168,85,247,0.15),_transparent)]"></div>
        
        <img src="logo.png" alt="Optima Code" class="w-32 mb-10 neon-logo animate-pulse">
        
        <h1 class="text-7xl md:text-9xl font-black mb-6 tracking-tighter">OPTIMA<span class="text-purple-500">CODE</span></h1>
        <p class="text-gray-400 text-xl font-light mb-12">نصنع المستقبل البرمجي بلمسة فنية</p>
        
        <a href="mailto:optimacodee@gmail.com" class="px-12 py-5 bg-white text-black font-bold text-lg rounded-full hover:bg-purple-500 hover:text-white transition-all duration-300">
            احجز مشروعك الآن
        </a>
    </section>

    <!-- Services -->
    <section class="container mx-auto px-6 py-32">
        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass-card p-10 rounded-[2rem]">
                <div class="text-purple-500 text-5xl mb-6">🚀</div>
                <h3 class="text-2xl font-bold mb-4">الابتكار الرقمي</h3>
                <p class="text-gray-400">نحول أفكارك لمواقع ذات أداء فائق وتجربة مستخدم عالمية.</p>
            </div>
            
            <div class="glass-card p-10 rounded-[2rem]">
                <div class="text-purple-500 text-5xl mb-6">👁️</div>
                <h3 class="text-2xl font-bold mb-4">الهوية البصرية</h3>
                <p class="text-gray-400">تصاميم استراتيجية تعطي لمشروعك قوة وحضور في السوق.</p>
            </div>

            <div class="glass-card p-10 rounded-[2rem]">
                <div class="text-purple-500 text-5xl mb-6">⚡</div>
                <h3 class="text-2xl font-bold mb-4">أنظمة ذكية</h3>
                <p class="text-gray-400">أدوات مخصصة لأتمتة أعمالك ورفع كفاءة فريقك.</p>
            </div>
        </div>
    </section>

</body>
</html>
